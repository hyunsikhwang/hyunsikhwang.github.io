<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .mode-toggle {
            display: inline-flex;
            align-items: center;
            gap: 1px;
            padding: 2px;
            border: 1px solid #d4d4d8;
            background: #f5f5f5;
            border-radius: 999px;
        }
        .mode-toggle button {
            min-width: 58px;
            height: 26px;
            border-radius: 999px;
            font-family: "Manrope", Arial, sans-serif;
            font-size: 12px;
            font-weight: 700;
            line-height: 1;
            color: #52525b;
            transition: background 160ms ease, color 160ms ease, box-shadow 160ms ease;
        }
        .mode-toggle button[aria-pressed="true"] {
            background: #ffffff;
            color: #18181b;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
        }
        .tool-grid {
            perspective: 1400px;
            perspective-origin: center center;
        }
        .tool-card {
            position: relative;
            min-height: 180px;
            overflow: hidden;
            transform: translateX(0) rotateY(0deg);
            transform-style: preserve-3d;
            backface-visibility: hidden;
            transform-origin: center center;
            transition:
                transform 360ms cubic-bezier(0.2, 0.8, 0.2, 1),
                opacity 260ms ease,
                box-shadow 360ms ease,
                filter 360ms ease;
            will-change: transform, opacity, box-shadow, filter;
        }
        .tool-card::after {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 1;
            border-radius: inherit;
            background: linear-gradient(var(--card-shine-angle, 90deg), rgba(255, 255, 255, 0.52), rgba(255, 255, 255, 0) 42%, rgba(0, 0, 0, 0.14));
            opacity: 0;
            pointer-events: none;
            transition: opacity 220ms ease;
        }
        .tool-card.is-exiting {
            opacity: 0;
            transition-delay: var(--card-delay, 0ms);
            box-shadow: 0 22px 36px rgba(24, 24, 27, 0.16);
            filter: brightness(0.96);
        }
        .tool-card.is-exiting::after {
            opacity: 1;
        }
        .tool-grid[data-transition-direction="left"] .tool-card.is-exiting {
            --card-shine-angle: 90deg;
            transform: translateX(-58px) translateZ(24px) rotateY(-82deg) scale(0.94);
            transform-origin: center center;
        }
        .tool-grid[data-transition-direction="right"] .tool-card.is-exiting {
            --card-shine-angle: 270deg;
            transform: translateX(58px) translateZ(24px) rotateY(82deg) scale(0.94);
            transform-origin: center center;
        }
        .tool-card.is-entering {
            animation-duration: 460ms;
            animation-fill-mode: both;
            animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
            animation-delay: var(--card-delay, 0ms);
        }
        .tool-card.is-entering::after {
            animation: cardSurfaceShine 460ms cubic-bezier(0.16, 1, 0.3, 1) both;
            animation-delay: var(--card-delay, 0ms);
        }
        .tool-grid[data-transition-direction="left"] .tool-card.is-entering {
            --card-shine-angle: 270deg;
            transform-origin: center center;
            animation-name: cardTurnInFromRight;
        }
        .tool-grid[data-transition-direction="right"] .tool-card.is-entering {
            --card-shine-angle: 90deg;
            transform-origin: center center;
            animation-name: cardTurnInFromLeft;
        }
        .tool-card > div:first-of-type {
            position: relative;
            z-index: 1;
            padding-right: 72px;
        }
        .serial-launch {
            position: absolute;
            top: 20px;
            right: 22px;
            z-index: 2;
            font-family: "Manrope", Arial, sans-serif;
            font-size: 46px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: 0;
            color: #000000;
            opacity: 0.22;
            pointer-events: none;
            transition: transform 160ms ease, opacity 160ms ease;
        }
        .tool-card:hover .serial-launch,
        .tool-card:focus-visible .serial-launch {
            transform: translateY(-2px);
            opacity: 0.82;
        }
        .tool-card:active .serial-launch {
            transform: translateY(1px);
        }
        @keyframes cardTurnInFromRight {
            from {
                opacity: 0;
                transform: translateX(58px) translateZ(24px) rotateY(82deg) scale(0.94);
                filter: brightness(0.96);
                box-shadow: 0 22px 36px rgba(24, 24, 27, 0.16);
            }
            64% {
                opacity: 1;
                transform: translateX(-6px) translateZ(10px) rotateY(-7deg) scale(1.01);
            }
            to {
                opacity: 1;
                transform: translateX(0) rotateY(0deg) scale(1);
                filter: brightness(1);
                box-shadow: none;
            }
        }
        @keyframes cardTurnInFromLeft {
            from {
                opacity: 0;
                transform: translateX(-58px) translateZ(24px) rotateY(-82deg) scale(0.94);
                filter: brightness(0.96);
                box-shadow: 0 22px 36px rgba(24, 24, 27, 0.16);
            }
            64% {
                opacity: 1;
                transform: translateX(6px) translateZ(10px) rotateY(7deg) scale(1.01);
            }
            to {
                opacity: 1;
                transform: translateX(0) rotateY(0deg) scale(1);
                filter: brightness(1);
                box-shadow: none;
            }
        }
        @keyframes cardSurfaceShine {
            from {
                opacity: 0.9;
            }
            58% {
                opacity: 0.38;
            }
            to {
                opacity: 0;
            }
        }
        @media (max-width: 640px) {
            nav {
                padding-left: 16px;
                padding-right: 16px;
            }
            .mode-toggle button {
                min-width: 54px;
                height: 24px;

            }
            .tool-card > div:first-of-type {
                padding-right: 58px;
            }
            .serial-launch {
                font-size: 40px;
                right: 18px;
            }
        }
    </style>
</head>

<script>
    const cardClass = "tool-card relative h-full bg-surface-container-lowest border border-outline-variant/60 p-lg flex flex-col justify-between group hover:border-primary hover:shadow-sm transition-all duration-300 rounded-xl";
    const modeCopy = {

        {

            icon: "language",

        {

            title: "KOSPI Shock Recovery Analyzer",
            href: "https://kospi-shock-recovery-analyzer-239485161480.us-west1.run.app",
            icon: "stacked_line_chart",
            description: "Analyze KOSPI shock drawdowns, recovery paths, and rebound timing across market events.",
        },
        {
            key: "C",
            title: "KiStock AI Studio",
            href: "https://kistock.ai.studio",
            icon: "auto_awesome",
            description: "AI-powered research studio for Korean stock analysis and investment workflows.",
        },
    ];
    const privateCards = [
        {
            key: "1",
            title: "Retirement Countdown",
            href: "https://retirement-countdown-the-final-mission-239485161480.us-west1.run.app/",
            icon: "timer",
            description: "Private countdown mission dashboard for retirement planning milestones.",
        },
        {
            key: "2",
            title: "Naver Blog Scraper",
            href: "https://naver-blog-scraper-239485161480.us-west1.run.app",
            icon: "article",
            description: "Private scraper workspace for collecting and reviewing Naver Blog content.",
        },
        {
            key: "3",
            title: "HIRA Stats Explorer",
            href: "https://hira-stats-explorer-239485161480.us-west1.run.app",
            icon: "bar_chart",
            description: "Private explorer for HIRA statistics and data.",
        },
        {
            key: "4",
            title: "Real Estate Explorer",
            href: "https://real-estate-explorer-kr.wonderful-writing-32.chatgpt.site/",
            icon: "real_estate_agent",
            description: "Private explorer for real estate data.",
        },
        {
            key: "5",
            title: "PDF Password Remover",
            href: "https://pdf-password-remover-239485161480.us-west1.run.app",
            icon: "picture_as_pdf",
            description: "Private utility for removing passwords from PDF files.",
        },
        {
            key: "6",
            title: "Social Screenshot Studio",
            href: "https://social-screenshot-studio.ai.studio",
            icon: "photo_camera",
            description: "Private studio for creating and reviewing social media screenshots.",
        },
    ];

    const toolGrid = document.getElementById("tool-grid");
    const modeTitle = document.getElementById("mode-title");
    const modeDescription = document.getElementById("mode-description");
    const toggleButtons = Array.from(document.querySelectorAll("[data-mode-toggle]"));
    const cardExitDurationMs = 320;
    let currentMode = "public";
    let hotkeyTargets = new Map();
    let touchStartX = 0;
    let touchStartY = 0;

    function getAlternateMode() {
        return currentMode === "public" ? "private" : "public";
    }

    function escapeHtml(value) {
        return value.replace(/[&<>"']/g, (char) => ({
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;",
        }[char]));
    }

    function renderCard(card, index = 0, animate = false) {
        const title = escapeHtml(card.title);
        const description = escapeHtml(card.description);
        const icon = escapeHtml(card.icon);
        const key = escapeHtml(card.key);
        const href = escapeHtml(card.href);
        const animationClass = animate ? " is-entering" : "";
        const delay = animate ? ` style="--card-delay: ${index * 35}ms"` : "";
        return `
<a aria-keyshortcuts="${key}" class="${cardClass}${animationClass}" data-hotkey="${key}" href="${href}" rel="noopener noreferrer" target="_blank"${delay}>
<span aria-hidden="true" class="serial-launch">${key}</span>
<div>
<div class="flex items-center justify-between mb-md">
<div class="w-10 h-10 flex items-center justify-center bg-surface-container-low rounded-lg text-primary">
<span class="material-symbols-outlined" data-icon="${icon}">${icon}</span>
</div>
<span class="material-symbols-outlined text-sm text-on-surface-variant opacity-0 group-hover:opacity-100 transition-opacity" data-icon="north_east">north_east</span>
</div>
<h3 class="font-manrope text-body-lg font-semibold text-on-surface group-hover:text-primary transition-colors">${title}</h3>
</div>
<div class="pointer-events-none absolute bottom-full left-1/2 -translate-x-1/2 mb-3 w-64 bg-neutral-900 dark:bg-neutral-800 text-white dark:text-neutral-100 text-xs p-3 rounded-lg shadow-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-30 text-center font-manrope font-normal leading-relaxed">
${description}
<div class="absolute top-full left-1/2 -translate-x-1/2 -mt-1 border-4 border-transparent border-t-neutral-900 dark:border-t-neutral-800"></div>
</div>
</a>`;
    }

    function updateHotkeys() {
        hotkeyTargets = new Map(
            Array.from(document.querySelectorAll("[data-hotkey]")).map((card) => [
                card.dataset.hotkey.toUpperCase(),
                card,
            ])
        );
    }

    function updateToggleState() {
        toggleButtons.forEach((button) => {
            button.setAttribute("aria-pressed", String(button.dataset.modeToggle === currentMode));
        });
    }

    function updateModeCopy() {
        const copy = modeCopy[currentMode];
        modeTitle.textContent = copy.title;
        modeDescription.textContent = copy.description;
    }

    function renderCards(mode, animate = false, direction = "left") {
        toolGrid.dataset.transitionDirection = direction;
        const cards = mode === "private" ? privateCards : publicCards;
        toolGrid.innerHTML = cards.map((card, index) => renderCard(card, index, animate)).join("");
        if (animate) {
            Array.from(toolGrid.querySelectorAll(".tool-card.is-entering")).forEach((card) => {
                card.addEventListener("animationend", () => {
                    card.classList.remove("is-entering");
                }, { once: true });
            });
        }
        updateHotkeys();
    }

    function getDirectionForMode(nextMode) {
        return nextMode === "private" ? "left" : "right";
    }

    function setMode(nextMode, direction = getDirectionForMode(nextMode)) {
        if (nextMode === currentMode) {
            return;
        }

        toolGrid.dataset.transitionDirection = direction;
        Array.from(toolGrid.querySelectorAll(".tool-card")).forEach((card, index) => {
            card.style.setProperty("--card-delay", `${index * 24}ms`);
            card.classList.remove("is-entering");
            card.classList.add("is-exiting");
        });

        window.setTimeout(() => {
            currentMode = nextMode;
            renderCards(currentMode, true, direction);
            updateModeCopy();
            updateToggleState();
        }, cardExitDurationMs);
    }

    toggleButtons.forEach((button) => {
        button.addEventListener("click", () => setMode(button.dataset.modeToggle, getDirectionForMode(button.dataset.modeToggle)));
    });

    document.addEventListener("keydown", (event) => {
        if (event.altKey || event.ctrlKey || event.metaKey || event.shiftKey || event.repeat) {
            return;
        }

        const activeTag = document.activeElement?.tagName;
        if (["INPUT", "SELECT", "TEXTAREA"].includes(activeTag) || document.activeElement?.isContentEditable) {
            return;
        }

        if (event.key === "ArrowLeft" || event.key === "ArrowRight") {
            event.preventDefault();
            setMode(getAlternateMode(), event.key === "ArrowLeft" ? "left" : "right");
            return;
        }

        const target = hotkeyTargets.get(event.key.toUpperCase());
        if (!target) {
            return;
        }

        event.preventDefault();
        target.click();
    });

    document.addEventListener("touchstart", (event) => {
        const touch = event.touches[0];
        if (!touch) {
            return;
        }
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
    }, { passive: true });

    document.addEventListener("touchend", (event) => {
        const touch = event.changedTouches[0];
        if (!touch) {
            return;
        }

        const deltaX = touch.clientX - touchStartX;
        const deltaY = touch.clientY - touchStartY;
        const isHorizontalSwipe = Math.abs(deltaX) >= 52 && Math.abs(deltaX) > Math.abs(deltaY) * 1.4;
        if (!isHorizontalSwipe) {
            return;
        }

        setMode(getAlternateMode(), deltaX < 0 ? "left" : "right");
    }, { passive: true });

    renderCards(currentMode, false, "left");
    updateModeCopy();
